<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习助手 - 听说读写单词语法</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>英语学习助手</h1>
        <div class="header-actions">
            <div class="word-count">总词汇量: <span id="totalWords">0</span></div>
            <button id="uploadBtn" class="upload-button">📁 上传</button>
        </div>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="#listening" class="active" data-module="listening">听力</a></li>
            <li><a href="#speaking" data-module="speaking">口语</a></li>
            <li><a href="#reading" data-module="reading">阅读</a></li>
            <li><a href="#writing" data-module="writing">写作</a></li>
            <li><a href="#vocabulary" data-module="vocabulary">单词</a></li>
            <li><a href="#grammar" data-module="grammar">语法</a></li>
        </ul>
    </nav>

    <!-- 上传弹窗 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传内容</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="upload-tabs">
                    <button class="tab-btn active" data-tab="text">文本输入</button>
                    <button class="tab-btn" data-tab="file">文件上传</button>
                </div>
                
                <!-- 文本输入面板 -->
                <div class="tab-content active" id="textTab">
                    <textarea id="textInput" placeholder="在此输入你的学习内容..."></textarea>
                    <div class="text-options">
                        <label>
                            <input type="checkbox" id="autoExtractWords"> 自动提取英文单词
                        </label>
                    </div>
                </div>
                
                <!-- 文件上传面板 -->
                <div class="tab-content" id="fileTab">
                    <input type="file" id="fileInput" multiple>
                    <p class="file-info">支持格式：音频、图片、PDF、Word、TXT等</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelUpload">取消</button>
                <button id="confirmUpload">确认上传</button>
            </div>
        </div>
    </div>

    <main class="content-container">
        <!-- 听力模块 -->
        <section id="listening" class="module active">
            <h2>听力练习</h2>
            <div class="content-display" id="listeningContent">
                <p>暂无听力内容</p>
            </div>
        </section>

        <!-- 口语模块 -->
        <section id="speaking" class="module">
            <h2>口语练习</h2>
            <div class="content-display" id="speakingContent">
                <p>暂无口语内容</p>
            </div>
        </section>

        <!-- 阅读模块 -->
        <section id="reading" class="module">
            <h2>阅读练习</h2>
            <div class="content-display" id="readingContent">
                <p>暂无阅读内容</p>
            </div>
        </section>

        <!-- 写作模块 -->
        <section id="writing" class="module">
            <h2>写作练习</h2>
            <div class="content-display" id="writingContent">
                <p>暂无写作内容</p>
            </div>
        </section>

        <!-- 单词模块 -->
        <section id="vocabulary" class="module">
            <h2>单词学习</h2>
            <div class="content-display" id="vocabularyContent">
                <p>暂无单词内容</p>
            </div>
        </section>

        <!-- 语法模块 -->
        <section id="grammar" class="module">
            <h2>语法学习</h2>
            <div class="content-display" id="grammarContent">
                <p>暂无语法内容</p>
            </div>
        </section>
    </main>

    <script src="js/wordCounter.js"></script>
